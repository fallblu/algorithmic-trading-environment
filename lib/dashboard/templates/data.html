{% extends "base.html" %}
{% block title %}Data Management{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Data Management</h1>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Data Inventory -->
    <div class="lg:col-span-2 card rounded-lg p-4">
        <h2 class="text-sm font-semibold text-gray-400 mb-3">Data Inventory</h2>
        <div id="data-inventory"
             hx-get="/data/partials/inventory"
             hx-trigger="load"
             hx-swap="innerHTML">
            {% include "partials/data_inventory.html" %}
        </div>
    </div>

    <!-- Download Form -->
    <div class="card rounded-lg p-4">
        <h2 class="text-sm font-semibold text-gray-400 mb-3">Download Data</h2>
        <form hx-post="/data/api/download" hx-target="#download-status" hx-swap="innerHTML">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Exchange</label>
                    <select name="exchange" id="exchange-select"
                            class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-gray-200 text-sm focus:outline-none focus:border-blue-500">
                        <option value="kraken">Kraken</option>
                        <option value="oanda">Oanda</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Symbols</label>
                    <textarea name="symbols" id="symbols-input" rows="2" required
                              placeholder="BTC/USD, ETH/USD, SOL/USD"
                              class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-gray-200 text-sm focus:outline-none focus:border-blue-500"></textarea>
                    <p class="text-xs text-gray-500 mt-1">Comma-separated</p>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Timeframe</label>
                    <select name="timeframe"
                            class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-gray-200 text-sm focus:outline-none focus:border-blue-500">
                        <option value="1m">1m</option>
                        <option value="5m">5m</option>
                        <option value="15m">15m</option>
                        <option value="30m">30m</option>
                        <option value="1h" selected>1h</option>
                        <option value="4h">4h</option>
                        <option value="1d">1d</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Backfill Days</label>
                    <input type="number" name="backfill_days" value="30" min="1" max="365"
                           class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-gray-200 text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium mt-4">
                Download
            </button>
        </form>
        <div id="download-status" class="mt-3 text-sm"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const EXCHANGE_DEFAULTS = {
        kraken: "BTC/USD, ETH/USD, SOL/USD, XRP/USD, ADA/USD, DOT/USD, LINK/USD, AVAX/USD",
        oanda: "EUR/USD, GBP/USD, USD/JPY, AUD/USD, USD/CAD, NZD/USD, USD/CHF, EUR/GBP",
    };
    const exchangeSelect = document.getElementById('exchange-select');
    const symbolsInput = document.getElementById('symbols-input');

    function setDefaults() {
        const defaults = EXCHANGE_DEFAULTS[exchangeSelect.value];
        if (defaults) symbolsInput.value = defaults;
    }

    exchangeSelect.addEventListener('change', setDefaults);
    setDefaults();
})();
</script>
{% endblock %}
