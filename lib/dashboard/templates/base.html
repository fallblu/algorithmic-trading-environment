<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} | Trading Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        body { background-color: #1a1a2e; }
        .card { background-color: #16213e; }
        .accent { background-color: #0f3460; }
        .nav-link:hover { background-color: #0f3460; }
        .nav-link.active { background-color: #0f3460; border-bottom: 2px solid #e94560; }
    </style>
</head>
<body class="h-full text-gray-200">
    <!-- Navigation -->
    <nav class="accent shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center space-x-1">
                    <span class="text-lg font-bold text-white mr-6">AlgoTrader</span>
                    <a href="/portfolios" class="nav-link px-4 py-2 rounded text-sm font-medium text-gray-200
                        {% if active_page == 'portfolios' %}active{% endif %}">Portfolios</a>
                    <a href="/editor" class="nav-link px-4 py-2 rounded text-sm font-medium text-gray-200
                        {% if active_page == 'editor' %}active{% endif %}">Editor</a>
                    <a href="/charts" class="nav-link px-4 py-2 rounded text-sm font-medium text-gray-200
                        {% if active_page == 'charts' %}active{% endif %}">Charts</a>
                    <a href="/monitoring" class="nav-link px-4 py-2 rounded text-sm font-medium text-gray-200
                        {% if active_page == 'monitoring' %}active{% endif %}">Monitoring</a>
                    <a href="/data" class="nav-link px-4 py-2 rounded text-sm font-medium text-gray-200
                        {% if active_page == 'data' %}active{% endif %}">Data</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col space-y-2"></div>

    <script src="/static/js/toasts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
