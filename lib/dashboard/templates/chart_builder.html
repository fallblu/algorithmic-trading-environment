{% extends "base.html" %}
{% block title %}Chart Builder{% endblock %}

{% block content %}
{# Break out of base.html max-w-7xl container for full-width chart #}
<div style="margin-left: calc(-50vw + 50%); margin-right: calc(-50vw + 50%); width: 100vw; height: calc(100vh - 5rem);"
     class="flex flex-col" id="chart-page">

    <!-- Toolbar -->
    <div class="chart-toolbar">
        <!-- Row 1: primary controls -->
        <div class="flex items-center gap-1 flex-wrap" style="gap: 0.5rem;">
            <!-- Exchange -->
            <select id="ctl-exchange" class="toolbar-select" title="Exchange">
                <option value="">Exchange…</option>
            </select>

            <!-- Symbol -->
            <select id="ctl-symbol" class="toolbar-select" title="Symbol">
                <option value="">Symbol…</option>
            </select>

            <span class="toolbar-divider"></span>

            <!-- Timeframe pills -->
            <div id="tf-pills" class="flex items-center" style="gap: 2px;">
                <!-- populated by JS -->
            </div>

            <span class="toolbar-divider"></span>

            <!-- Chart type toggle -->
            <div class="flex items-center" style="gap: 2px;">
                <button class="chart-type-btn active" data-type="candlestick" title="Candlestick">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="7" y="1" width="2" height="14" opacity="0.5"/>
                        <rect x="5" y="4" width="6" height="8" rx="1"/>
                    </svg>
                </button>
                <button class="chart-type-btn" data-type="line" title="Line">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <polyline points="1,12 5,6 9,9 15,3"/>
                    </svg>
                </button>
            </div>

            <span class="toolbar-divider"></span>

            <!-- Indicators button (with count badge) -->
            <div style="position: relative;">
                <button id="btn-indicators" class="toolbar-btn" title="Indicators">
                    Indicators <span id="indicator-count" class="indicator-badge" style="display:none;">0</span>
                </button>
                <!-- Indicator popover -->
                <div id="indicator-popover" class="indicator-popover" style="display:none;">
                    <div class="text-xs text-gray-400 mb-2 font-semibold" style="padding: 0 0.25rem;">OVERLAYS</div>
                    <div id="pop-overlays"></div>
                    <div class="text-xs text-gray-400 mb-2 mt-3 font-semibold" style="padding: 0 0.25rem;">SUBPLOTS</div>
                    <div id="pop-subplots"></div>
                </div>
            </div>

            <span class="toolbar-divider"></span>

            <!-- Date range -->
            <div class="flex items-center" style="gap: 2px;">
                <input type="date" id="ctl-start" class="toolbar-date" title="Start date">
                <input type="date" id="ctl-end" class="toolbar-date" title="End date">
                <span id="bar-count" class="text-gray-500 text-xs" style="margin-left: 0.25rem;"></span>
            </div>

            <span class="toolbar-divider"></span>

            <!-- Portfolio selector -->
            <select id="ctl-portfolio" class="toolbar-select" title="Portfolio overlay">
                <option value="">No portfolio</option>
            </select>

            <span class="toolbar-divider"></span>

            <!-- Layouts -->
            <div style="position: relative;">
                <button id="btn-layouts" class="toolbar-btn" title="Layouts">Layouts</button>
                <div id="layout-popover" class="indicator-popover" style="display:none; min-width: 220px;">
                    <div class="text-xs text-gray-400 mb-2 font-semibold">SAVE</div>
                    <div class="flex items-center" style="gap: 0.35rem; margin-bottom: 0.75rem;">
                        <input type="text" id="layout-name" placeholder="Layout name"
                               class="toolbar-date" style="flex:1; width: auto;">
                        <button onclick="saveLayout()" class="toolbar-btn" style="font-size: 0.7rem;">Save</button>
                    </div>
                    <div class="text-xs text-gray-400 mb-2 font-semibold">LOAD</div>
                    <div id="layout-list" class="text-sm"></div>
                </div>
            </div>

            <!-- Spinner -->
            <svg id="chart-spinner" class="chart-spinner" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <!-- Chart area -->
    <div class="flex-1" style="min-height: 0; position: relative;">
        <div id="chart-display" style="width:100%; height:100%;"></div>
        <div id="chart-empty" class="flex items-center justify-center"
             style="position:absolute;inset:0;display:none;">
            <div class="text-center text-gray-500">
                <div>Select an exchange and symbol to view chart data</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    // --- State ---
    let inventory = [];
    let seriesList = [];
    let portfolioList = [];
    let layoutList = [];
    let buildTimer = null;
    let chartType = 'candlestick';

    const $ = id => document.getElementById(id);

    // --- Init: parallel fetch ---
    Promise.all([
        fetch('/charts/api/inventory').then(r => r.json()),
        fetch('/charts/api/series').then(r => r.json()),
        fetch('/charts/api/portfolios').then(r => r.json()),
        fetch('/charts/api/layouts').then(r => r.json()),
    ]).then(([invData, serData, portData, layData]) => {
        inventory = invData.inventory || [];
        seriesList = serData.series || [];
        portfolioList = portData.portfolios || [];
        layoutList = layData.layouts || [];
        populateExchanges();
        populateSeries();
        populatePortfolios();
        populateLayouts();
        showEmpty(true);
    }).catch(() => showEmpty(true));

    // --- Inventory-driven dropdowns ---
    function populateExchanges() {
        const exchanges = [...new Set(inventory.map(d => d.exchange))].sort();
        const sel = $('ctl-exchange');
        sel.innerHTML = '<option value="">Exchange…</option>';
        exchanges.forEach(e => {
            sel.innerHTML += `<option value="${e}">${e}</option>`;
        });
    }

    function onExchangeChange() {
        const ex = $('ctl-exchange').value;
        const syms = [...new Set(
            inventory.filter(d => d.exchange === ex).map(d => d.symbol)
        )].sort();
        const sel = $('ctl-symbol');
        sel.innerHTML = '<option value="">Symbol…</option>';
        syms.forEach(s => {
            sel.innerHTML += `<option value="${s}">${s}</option>`;
        });
        $('tf-pills').innerHTML = '';
        scheduleBuild();
    }

    function onSymbolChange() {
        const ex = $('ctl-exchange').value;
        const sym = $('ctl-symbol').value;
        const tfs = [...new Set(
            inventory.filter(d => d.exchange === ex && d.symbol === sym).map(d => d.timeframe)
        )];
        // Sort timeframes logically
        const order = ['1m','5m','15m','30m','1h','4h','1d','1w'];
        tfs.sort((a, b) => (order.indexOf(a) === -1 ? 99 : order.indexOf(a)) - (order.indexOf(b) === -1 ? 99 : order.indexOf(b)));

        const container = $('tf-pills');
        container.innerHTML = '';
        tfs.forEach((tf, i) => {
            const btn = document.createElement('button');
            btn.className = 'tf-pill' + (i === 0 ? ' active' : '');
            btn.textContent = tf;
            btn.dataset.tf = tf;
            btn.addEventListener('click', () => {
                container.querySelectorAll('.tf-pill').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                scheduleBuild();
            });
            container.appendChild(btn);
        });

        // Update date range from matching inventory item
        const match = inventory.find(d => d.exchange === ex && d.symbol === sym);
        if (match) {
            if (match.start) $('ctl-start').value = match.start.slice(0, 10);
            if (match.end) $('ctl-end').value = match.end.slice(0, 10);
        }
        scheduleBuild();
    }

    $('ctl-exchange').addEventListener('change', onExchangeChange);
    $('ctl-symbol').addEventListener('change', onSymbolChange);
    $('ctl-start').addEventListener('change', () => scheduleBuild());
    $('ctl-end').addEventListener('change', () => scheduleBuild());
    $('ctl-portfolio').addEventListener('change', () => scheduleBuild());

    // --- Chart type toggle ---
    document.querySelectorAll('.chart-type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            chartType = btn.dataset.type;
            scheduleBuild();
        });
    });

    // --- Series / Indicators ---
    function populateSeries() {
        const overlayContainer = $('pop-overlays');
        const subplotContainer = $('pop-subplots');
        overlayContainer.innerHTML = '';
        subplotContainer.innerHTML = '';
        seriesList.forEach(s => {
            const label = document.createElement('label');
            label.className = 'indicator-item';
            label.innerHTML = `<input type="checkbox" value="${s.key}" data-subplot="${s.subplot}"> <span>${s.name}</span>`;
            label.querySelector('input').addEventListener('change', () => {
                updateIndicatorCount();
                scheduleBuild();
            });
            if (s.subplot) {
                subplotContainer.appendChild(label);
            } else {
                overlayContainer.appendChild(label);
            }
        });
        if (!overlayContainer.innerHTML) overlayContainer.innerHTML = '<div class="text-gray-600 text-xs">None available</div>';
        if (!subplotContainer.innerHTML) subplotContainer.innerHTML = '<div class="text-gray-600 text-xs">None available</div>';
    }

    function updateIndicatorCount() {
        const count = document.querySelectorAll('#indicator-popover input:checked').length;
        const badge = $('indicator-count');
        if (count > 0) {
            badge.textContent = count;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    // Toggle indicator popover
    $('btn-indicators').addEventListener('click', (e) => {
        e.stopPropagation();
        const pop = $('indicator-popover');
        const layoutPop = $('layout-popover');
        layoutPop.style.display = 'none';
        pop.style.display = pop.style.display === 'none' ? 'block' : 'none';
    });

    // --- Portfolios ---
    function populatePortfolios() {
        const sel = $('ctl-portfolio');
        sel.innerHTML = '<option value="">No portfolio</option>';
        portfolioList.forEach(p => {
            sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        });
    }

    // --- Layouts ---
    function populateLayouts() {
        const container = $('layout-list');
        if (layoutList.length === 0) {
            container.innerHTML = '<div class="text-gray-600 text-xs">No saved layouts</div>';
            return;
        }
        container.innerHTML = '';
        layoutList.forEach(name => {
            const div = document.createElement('div');
            div.className = 'layout-item';
            div.textContent = name;
            div.addEventListener('click', () => loadLayout(name));
            container.appendChild(div);
        });
    }

    window.saveLayout = function() {
        const name = $('layout-name').value.trim();
        if (!name) { showToast('Enter a layout name', 'error'); return; }
        fetch('/charts/api/layouts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, config: getConfig() })
        })
        .then(r => r.json())
        .then(d => {
            if (d.ok) {
                showToast('Layout saved');
                if (!layoutList.includes(name)) layoutList.push(name);
                populateLayouts();
            } else {
                showToast(d.error || 'Save failed', 'error');
            }
        });
    };

    function loadLayout(name) {
        fetch('/charts/api/layouts/' + encodeURIComponent(name))
        .then(r => r.json())
        .then(data => {
            const cfg = data.config || data;
            if (cfg.exchange) { $('ctl-exchange').value = cfg.exchange; onExchangeChange(); }
            if (cfg.symbol) $('ctl-symbol').value = cfg.symbol;
            if (cfg.timeframe) {
                document.querySelectorAll('.tf-pill').forEach(b => {
                    b.classList.toggle('active', b.dataset.tf === cfg.timeframe);
                });
            }
            if (cfg.main_chart) {
                chartType = cfg.main_chart;
                document.querySelectorAll('.chart-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === cfg.main_chart);
                });
            }
            if (cfg.start) $('ctl-start').value = cfg.start;
            if (cfg.end) $('ctl-end').value = cfg.end;
            if (cfg.portfolio_id) $('ctl-portfolio').value = cfg.portfolio_id;
            // Restore indicator checkboxes
            document.querySelectorAll('#indicator-popover input[type="checkbox"]').forEach(cb => {
                const overlays = cfg.overlays || [];
                const subplots = cfg.subplots || [];
                cb.checked = overlays.includes(cb.value) || subplots.includes(cb.value);
            });
            updateIndicatorCount();
            $('layout-popover').style.display = 'none';
            buildChart();
        });
    }

    // --- Build ---
    function getConfig() {
        const activeTf = document.querySelector('.tf-pill.active');
        return {
            exchange: $('ctl-exchange').value,
            symbol: $('ctl-symbol').value,
            timeframe: activeTf ? activeTf.dataset.tf : '1h',
            start: $('ctl-start').value || undefined,
            end: $('ctl-end').value || undefined,
            main_chart: chartType,
            overlays: [...document.querySelectorAll('#pop-overlays input:checked')].map(el => el.value),
            subplots: [...document.querySelectorAll('#pop-subplots input:checked')].map(el => el.value),
            portfolio_id: $('ctl-portfolio').value || undefined,
        };
    }

    function scheduleBuild() {
        clearTimeout(buildTimer);
        buildTimer = setTimeout(buildChart, 400);
    }

    function buildChart() {
        const config = getConfig();
        if (!config.exchange || !config.symbol) {
            showEmpty(true);
            return;
        }
        showEmpty(false);
        $('chart-spinner').style.display = 'inline-block';

        fetch('/charts/api/build', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config),
        })
        .then(r => r.json())
        .then(data => {
            $('chart-spinner').style.display = 'none';
            if (data.error) {
                showToast(data.error, 'error');
                showEmpty(true);
                return;
            }
            Plotly.react('chart-display', data.data, data.layout, {
                responsive: true,
                displayModeBar: true,
                modeBarButtonsToRemove: ['lasso2d', 'select2d'],
            });
            if (data.bars != null) {
                $('bar-count').textContent = data.bars.toLocaleString() + ' bars';
            }
        })
        .catch(() => {
            $('chart-spinner').style.display = 'none';
            showToast('Chart build failed', 'error');
        });
    }

    function showEmpty(show) {
        $('chart-empty').style.display = show ? 'flex' : 'none';
    }

    // --- Layout popover toggle ---
    $('btn-layouts').addEventListener('click', (e) => {
        e.stopPropagation();
        const pop = $('layout-popover');
        const indPop = $('indicator-popover');
        indPop.style.display = 'none';
        pop.style.display = pop.style.display === 'none' ? 'block' : 'none';
    });

    // Close popovers on outside click
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#btn-indicators') && !e.target.closest('#indicator-popover')) {
            $('indicator-popover').style.display = 'none';
        }
        if (!e.target.closest('#btn-layouts') && !e.target.closest('#layout-popover')) {
            $('layout-popover').style.display = 'none';
        }
    });
})();
</script>
{% endblock %}
