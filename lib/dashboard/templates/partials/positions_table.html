{% for pos in positions|default([]) %}
<tr class="border-b border-gray-700 hover:bg-gray-800">
    <td class="px-4 py-2 text-gray-200">{{ pos.symbol }}</td>
    <td class="px-4 py-2">
        <span class="{% if pos.side == 'long' %}text-green-400{% else %}text-red-400{% endif %}">
            {{ pos.side|upper }}
        </span>
    </td>
    <td class="px-4 py-2 text-gray-200">{{ pos.qty }}</td>
    <td class="px-4 py-2 text-gray-200">{{ pos.entry_price }}</td>
    <td class="px-4 py-2 {% if pos.unrealized_pnl >= 0 %}text-green-400{% else %}text-red-400{% endif %}">
        {{ "%.2f"|format(pos.unrealized_pnl) }}
    </td>
</tr>
{% else %}
<tr>
    <td colspan="5" class="px-4 py-4 text-center text-gray-500">No open positions.</td>
</tr>
{% endfor %}
