<div class="flex items-center justify-between bg-[#16213e] border border-gray-600 rounded-lg shadow-lg px-4 py-3 min-w-[280px] max-w-sm text-sm text-gray-200"
     role="alert">
    <span>{{ message }}</span>
    <button onclick="this.parentElement.remove()"
            class="ml-4 text-gray-400 hover:text-white text-lg leading-none">&times;</button>
</div>
