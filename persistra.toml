[environment]
name = "trading"
description = "Algorithmic trading portfolio management environment"
python = "3.12"

[dependencies]
packages = [
    "pandas>=2.0",
    "pyarrow>=14.0",
    "numpy>=1.26",
    "requests>=2.31",
    "httpx>=0.27",
    "websockets>=16.0",
    "pandas-ta>=0.3",
    "fastapi>=0.109",
    "uvicorn>=0.27",
    "jinja2>=3.1",
    "plotly>=5.18",
    "pytest>=8.0",
]

[state.schema]
portfolios = { type = "dict", default = {}, history = 50 }
active_processes = { type = "dict", default = {} }
backtest_results = { type = "dict", default = {}, history = 200 }
saved_chart_layouts = { type = "dict", default = {} }

[dashboard]
auth_token = ""
host = "127.0.0.1"
port = 8050

[profiles.default]
exchange = "kraken"
