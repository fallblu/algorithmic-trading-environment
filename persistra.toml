[environment]
name = "trading"
description = "Systematic/quantitative backtesting and trading environment"
python = "3.12"

[dependencies]
packages = [
    "pandas>=2.0",
    "pyarrow>=14.0",
    "requests>=2.31",
    "numpy>=1.26",
    "websockets>=16.0",
    "httpx>=0.27",
    "scipy>=1.12",
    "fastapi>=0.109",
    "uvicorn>=0.27",
    "jinja2>=3.1",
    "plotly>=5.18",
    "pytest>=8.0",
    "pytest-cov>=4.1",
]

optional_packages = [
    "hmmlearn>=0.3",
]

[state.schema]
# Account — legitimately global state with history tracking
account_balances = { type = "dict", default = {}, history = 100 }
account_equity = { type = "float", default = 0.0, history = 1000 }
